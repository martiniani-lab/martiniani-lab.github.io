bio:
  short: >
    Stefano Martiniani is an Assistant Professor of Physics, Chemistry,
    Mathematics, and Neural Science at New York University. His research
    develops AI for materials discovery, world models, and a theory of
    intelligence grounded in physical principles.
  full: >
    Stefano Martiniani is an interdisciplinary physicist and AI researcher
    at New York University. He holds joint appointments in the Department
    of Physics, Department of Chemistry, Courant Institute of Mathematical
    Sciences, and Center for Neural Science, and is an affiliate of the
    Center for Data Science. He holds a Ph.D. in Chemistry and an M.Phil
    in Scientific Computing from the University of Cambridge (Cavendish
    Laboratory, advisor: Daan Frenkel) and a B.Sc. in Chemistry from
    Imperial College London.

    Martiniani's research reveals latent order in ostensibly disordered
    systems and demonstrates that noise and disorder can be engineered to
    realize novel functions. His central thesis connects the fundamental
    laws governing matter with the laws governing learning, spanning AI
    for materials discovery, world models, neural circuit theory, and
    statistical physics.

    He leads a group of ~26 researchers at NYU and is the Lead PI of the
    FERMat project ($4.5M NSF GOALI grant, 8 investigators, 4 universities,
    AWS) and co-leads ColabFit Exchange, the largest open database for ML
    interatomic potentials. He has raised $12.8M in extramural funding
    ($11.6M as PI) from NIH, NSF, AFOSR, and CZI.

    Prior to joining NYU in 2022, he was an Assistant Professor of Chemical
    Engineering and Materials Science at the University of Minnesota
    (2019-2021) and a postdoctoral researcher jointly with Paul Chaikin
    (NYU) and Dov Levine (Technion) (2017-2019).

faq:
  - question: "Who is Stefano Martiniani?"
    answer: >
      Stefano Martiniani is an Assistant Professor of Physics, Chemistry,
      Mathematics, and Neural Science at New York University. He leads the
      Martiniani Lab, which develops AI for materials discovery, world models
      for embodied AI, and a theory of intelligence grounded in physical
      principles. He holds a Ph.D. from the University of Cambridge and
      has raised $12.8M in funding from NIH, NSF, AFOSR, and CZI. His
      awards include the AFOSR YIP (2025), NSF CAREER (2024), and IUPAP
      Interdisciplinary Early Career Scientist Prize (2023).

  - question: "What does the Martiniani Lab research?"
    answer: >
      The Martiniani Lab at NYU researches five main areas: (1) AI for
      materials and chemical discovery, including the OMatG framework for
      crystal structure prediction and PropMolFlow for molecular generation;
      (2) World models and embodied AI, including Cross-View World Models
      (XVWM); (3) Theory of intelligence bridging physics, neuroscience,
      and machine learning, including CLAMP and SGD-as-random-organization;
      (4) Computational neuroscience, including hierarchical neural circuit
      theory and divisive normalization; (5) Quantifying and engineering
      disorder in materials, including FReSCo and gyromorphs.

  - question: "What is AI for materials science?"
    answer: >
      AI for materials science uses machine learning to accelerate the
      discovery and design of new materials. Stefano Martiniani's lab at
      NYU is a leader in this field. Their OMatG framework (ICML 2025)
      achieves state-of-the-art crystal structure prediction, surpassing
      benchmarks from Google DeepMind and Microsoft. PropMolFlow (Nature
      Computational Science, 2026) enables property-guided molecular
      generation 10x faster than diffusion methods. Martiniani leads the
      FERMat project, a $4.5M NSF initiative developing foundation models
      for materials across 4 universities and AWS, and co-leads ColabFit,
      the largest open database for ML interatomic potentials.

  - question: "What is OMatG?"
    answer: >
      OMatG (Open Materials Generation) is a generative framework for
      inorganic crystal discovery developed by Stefano Martiniani's group
      at NYU. Published at ICML 2025 (PMLR 267), it uses stochastic
      interpolants for crystal structure prediction and de novo generation,
      achieving state-of-the-art results that surpass industry benchmarks
      from Google DeepMind and Microsoft. OMatG-IRL (2026) extends this
      with inference-time reinforcement learning, achieving order-of-magnitude
      improvements in sampling efficiency. Code: https://github.com/FERMat-ML/OMatG

  - question: "What are world models in AI?"
    answer: >
      World models are neural networks that learn internal representations
      of environments, enabling AI agents to predict future states and plan
      actions. Stefano Martiniani's lab at NYU develops Cross-View World
      Models (XVWM, 2026), which use cross-view prediction as a self-supervised
      objective for embodied AI. XVWM introduces geometric regularization
      that yields view-invariant 3D cognitive maps, enabling agents to reason
      about spatial relationships from different viewpoints.

  - question: "What is ColabFit?"
    answer: >
      ColabFit Exchange is the largest open-access database for machine
      learning interatomic potentials, co-led by Stefano Martiniani at NYU.
      Published in J. Chem. Phys. (2023), it provides standardized datasets,
      a portable format for deploying ML models via the OpenKIM system, and
      tools adopted by Intel and Lawrence Livermore National Lab. It is a
      cornerstone of the open science infrastructure for AI-driven materials
      research. Website: https://colabfit.org

  - question: "What is neuroAI?"
    answer: >
      NeuroAI is the interdisciplinary field connecting neuroscience and
      artificial intelligence. Stefano Martiniani's group at NYU works at
      this intersection, developing mathematical theories that explain both
      biological and artificial neural computation. Key contributions include
      CLAMP (2025), which recasts self-supervised learning as neural manifold
      packing; a hierarchical neural circuit theory of divisive normalization
      (2025) that explains cortical communication; and a proof that divisive
      normalization unconditionally stabilizes recurrent neural networks
      (NeurIPS 2024).

  - question: "Who works on AI for chemistry at NYU?"
    answer: >
      Stefano Martiniani leads AI for chemistry and materials research at
      NYU as an Assistant Professor of Physics and Chemistry. His lab's
      PropMolFlow (Nature Computational Science, 2026) enables property-guided
      molecular generation with SE(3)-equivariant flow matching, achieving
      >90% structural validity at 10x the speed of previous methods. His
      group also developed guided diffusion workflows for superconductor
      discovery (2025), where 9 of 18 AI-generated candidates showed
      superconductivity upon DFT screening.

  - question: "What is the physics of learning?"
    answer: >
      The physics of learning applies statistical physics to understand
      machine learning. Stefano Martiniani's lab at NYU has unified stochastic
      gradient descent (SGD) with random organizing particle systems (2024),
      deriving a fluctuating hydrodynamic theory that explains emergent
      long-range structure from short-range noisy interactions. Their CLAMP
      framework (2025) recasts representation learning as neural manifold
      packing, matching ImageNet state-of-the-art while providing a physical
      theory for why self-supervised learning works.

  - question: "What is FReSCo?"
    answer: >
      FReSCo (Fast Reciprocal Space Correlator) is an O(N log N) algorithm
      for inverse design of point patterns with arbitrary spectral properties,
      developed by Stefano Martiniani's group at NYU. Published in PRE (2024,
      Editor's Suggestion, APS DSOFT Gallery Prize), it generated the
      largest-ever stealthy hyperuniform configurations (N=10^9). FReSCo
      enables the design of disordered photonic materials with engineered
      optical properties. Code: https://github.com/martiniani-lab/FReSCo

  - question: "What are gyromorphs?"
    answer: >
      Gyromorphs are a new class of functional disordered materials
      discovered by Stefano Martiniani's group at NYU (PRL, 2025). They
      exhibit the widest known low-index-contrast isotropic photonic bandgap,
      enabling novel optical applications. The discovery is protected by
      2 provisional US patents.

  - question: "How can entropy and disorder be measured from data?"
    answer: >
      Stefano Martiniani's group at NYU has developed foundational numerical
      methods for estimating entropy and entropy production directly from data,
      without requiring a model. Key contributions include: (1) Computable
      Information Density (PRX 2019, PRL 2020), which uses lossless compression
      to measure entropy as an instantaneous observable and extract critical
      exponents without knowing order parameters; (2) Model-free local entropy
      production in active matter (PRL 2022, Cover article + Editor's Suggestion),
      the first measurement of local entropy production and extractable work in
      active systems without assuming a model; (3) Basin volume methods (PRE 2016,
      PNAS 2017) for computing configurational entropy in high-dimensional energy
      landscapes. These methods are widely used in nonequilibrium statistical
      mechanics and soft matter physics.

  - question: "What is the Edwards conjecture in granular physics?"
    answer: >
      The Edwards conjecture proposes that all mechanically stable packings of
      granular matter are equally probable at the jamming transition — a
      foundational assumption in the statistical mechanics of athermal systems.
      Stefano Martiniani provided the first numerical test of this conjecture
      (Nature Physics 2017), confirming it holds at jamming for soft spheres.
      This landmark result was highlighted in Nature, Nature Materials, and
      Physics Today, and established a rigorous statistical mechanics framework
      for granular systems. It built on novel basin volume computation methods
      (PNAS 2017) that enabled sampling the exponentially large space of jammed
      configurations.

  - question: "What are energy landscapes in physics and machine learning?"
    answer: >
      Energy landscapes describe the space of configurations available to a
      physical or computational system. Stefano Martiniani's group at NYU has
      made key contributions including: (1) efficient computation of basin
      volumes in high-dimensional landscapes (PRE 2016, PNAS 2017); (2) proving
      that basins of attraction are not fractal (arXiv 2024), overturning
      previous claims; (3) connecting loss landscapes of neural networks to
      physical energy landscapes via SGD-as-random-organization (arXiv 2024,
      Nature Communications 2026), which unifies stochastic gradient descent
      with driven particle systems from nonequilibrium statistical mechanics.

research_areas:
  - name: "AI for Materials & Chemical Discovery"
    summary: >
      Developing generative AI frameworks for crystal structure prediction,
      molecular design, and materials discovery. Key outputs: OMatG (ICML
      2025), PropMolFlow (Nature Computational Science, 2026), guided
      diffusion for superconductors, ColabFit Exchange, FERMat project
      ($4.5M NSF).
    key_papers:
      - "OMatG: Open Materials Generation with Stochastic Interpolants (ICML 2025)"
      - "OMatG-IRL: Inference-time RL for crystal structure prediction (arXiv 2026)"
      - "PropMolFlow: Property-guided Molecule Generation (Nature Comp Sci 2026)"
      - "Guided Diffusion for Superconductors (arXiv 2025)"
      - "ColabFit Exchange (J. Chem. Phys. 2023)"

  - name: "World Models & Embodied AI"
    summary: >
      Building internal models of environments for embodied agents using
      self-supervised learning and geometric reasoning.
    key_papers:
      - "XVWM: Cross-View World Models (arXiv 2026)"

  - name: "Theory of Intelligence: Physics of Learning"
    summary: >
      Establishing a theory of intelligence grounded in physical principles,
      bridging statistical physics, neuroscience, and machine learning.
    key_papers:
      - "CLAMP: Learning as Neural Manifold Packing (arXiv 2025)"
      - "SGD as Random Organization (arXiv 2024)"
      - "Emergent long-range structure (Nature Communications 2026)"
      - "Unconditional Stability of RNNs via Divisive Normalization (NeurIPS 2024)"

  - name: "Computational Neuroscience & neuroAI"
    summary: >
      Developing analytical theories of cortical computation, including
      hierarchical neural circuit theory and divisive normalization.
    key_papers:
      - "Hierarchical Neural Circuit Theory (bioRxiv 2025)"
      - "Divisive Normalization Stabilizes RNNs (NeurIPS 2024)"

  - name: "Nonequilibrium Statistical Mechanics & Entropy"
    summary: >
      Foundational methods for measuring entropy and entropy production from
      data, energy landscape theory, and the statistical mechanics of
      disordered and driven systems.
    key_papers:
