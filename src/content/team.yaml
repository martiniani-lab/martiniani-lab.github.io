# Martiniani Lab Team

# --- Principal Investigator ---
- name: "Stefano Martiniani"
  role: pi
  image: stefano.jpg
  title: "Assistant Professor of Physics, Chemistry, Mathematics, and Neural Science"
  order: 1
  bio: >
    Dr. Martiniani is an Assistant Professor of Physics, Chemistry, Mathematics,
    and Neural Science at New York University from 2022. He is a core member of
    NYU's Center for Soft Matter Research and the Simons Center for Computational
    Physical Chemistry, and an affiliate of the Center for Data Science. He holds
    a Ph.D. in Chemistry and an M.Phil in Scientific Computing from the Cavendish
    Laboratory at the University of Cambridge (advisor: Daan Frenkel), and a B.Sc.
    in Chemistry from Imperial College London. Prior to joining NYU, Stefano was
    an assistant professor of Chemical Engineering and Materials Science at the
    University of Minnesota (2019-2021), and a postdoc jointly with Paul Chaikin
    (NYU) and Dov Levine (Technion) (2017-2019). His awards include the AFOSR YIP
    Award, NSF CAREER Award, Chan-Zuckerberg Initiative Neuroscience Pair Pilot
    Award, the inaugural Interdisciplinary Early Career Scientist Prize from the
    International Union of Pure and Applied Physics (IUPAP), Simons Foundation
    Faculty Fellowship (NYU), Gates Cambridge Scholarship, and the Outstanding
    Ph.D. Thesis Award from the University of Cambridge. He has been an NSF
    investigator since 2020, and an NIH investigator since 2022.

